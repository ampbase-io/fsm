name: CodeQL
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "27 6 * * 1"
permissions:
  contents: read
  security-events: write
  packages: read
env:
  # Default setup fails on this repo: its runner pins GOTOOLCHAIN=local with a
  # stable Go, and go.mod requires 1.27rc1 — autobuild dies with "go.mod
  # requires go >= 1.27rc1 (running go 1.26.x; GOTOOLCHAIN=local)". This
  # advanced setup installs a stable Go and lets GOTOOLCHAIN=auto fetch the
  # exact toolchain go.mod names before CodeQL's autobuild runs. Repo default
  # setup must be disabled in Settings → Code security for these uploads to be
  # accepted.
  GOTOOLCHAIN: auto
jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: autobuild
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
