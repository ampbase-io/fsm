name: Buf CI
on:
  pull_request:
    paths:
      - "proto/**"
      - "gen/**"
      - "buf.gen.yaml"
      - "buf.work.yaml"
      - ".github/workflows/buf.yml"
  push:
    branches: [main]
permissions:
  contents: read
env:
  # The protoc plugins run via `go run` (pinned by go.mod), so buf needs the
  # same toolchain treatment as Go CI.
  GOTOOLCHAIN: auto
jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Lint
        run: go run github.com/bufbuild/buf/cmd/buf@v1.28.1 lint
      - name: Check generated code is current
        # Mirrors the go:generate directive in fsm.go: full regeneration from a
        # clean gen/ catches stale and orphaned files alike; git status (not
        # diff) also catches generated files that were never committed.
        run: |
          rm -rf gen
          go run github.com/bufbuild/buf/cmd/buf@v1.28.1 generate
          drift="$(git status --porcelain gen)"
          test -z "$drift" || { echo "$drift"; echo "gen/ is stale: run go generate ./... and commit"; exit 1; }
